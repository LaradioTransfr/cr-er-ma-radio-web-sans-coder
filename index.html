<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfr - Radio Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #11111b);
            color: #ffffff;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* BARRE LATÉRALE (SIDEBAR) */
        .sidebar {
            width: 280px;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            z-index: 10;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #ff4757;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-align: center;
        }

        .menu-btn {
            background: transparent;
            color: #a4b0be;
            border: none;
            padding: 15px 20px;
            text-align: left;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn:hover, .menu-btn.active {
            background-color: #ff4757;
            color: white;
        }

        .menu-btn.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .menu-btn.locked:hover {
            background: transparent;
            color: #a4b0be;
        }

        /* ZONE DE CONTENU PRINCIPAL */
        .main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 40px;
        }

        .auth-buttons button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .auth-buttons button.secondary {
            background-color: transparent;
            border: 2px solid #ffffff;
        }

        .auth-buttons button:hover {
            transform: scale(1.05);
        }

        /* LES ONGLETS */
        .tab-content {
            display: none;
            width: 100%;
            max-width: 500px;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            text-align: center;
            width: 100%;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #ff4757;
        }

        .status {
            color: #2ed573;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #2ed573;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .counter {
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 14px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 15px;
        }

        .btn:hover { background-color: #ff6b81; }
        .btn-stream { background-color: #1e90ff; }
        .btn-stream:hover { background-color: #54a0ff; }

        .log-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
            color: #a4b0be;
        }

        input {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #ff4757;
        }

        /* FENÊTRE D'INSCRIPTION EN PLEIN MILIEU (OVERLAY) */
        .auth-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 11, 27, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .close-auth {
            background: transparent;
            color: #a4b0be;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- BARRE LATÉRALE -->
    <div class="sidebar">
        <div class="logo">Transfr</div>
        <button class="menu-btn active" onclick="switchTab('tab-listen', this)">📻 Écouter la Radio</button>
        <button class="menu-btn locked" id="studio-menu-btn" onclick="switchTab('tab-studio', this)" disabled>🎙 Mon Studio (Privé)</button>
        <button class="menu-btn" onclick="switchTab('tab-settings', this)">⚙️ Configuration</button>
    </div>

    <!-- CONTENU PRINCIPAL -->
    <div class="main-content">
        <header>
            <div class="auth-buttons" id="auth-section">
                <span id="user-welcome" style="display: none; color: #2ed573; margin-right: 15px; font-weight: bold;"></span>
                <button class="secondary" id="loginBtn" onclick="showAuthPage('login')">Connexion</button>
                <button id="registerBtn" onclick="showAuthPage('register')">Créer un compte</button>
            </div>
        </header>

        <!-- ONGLET 1 : LECTEUR -->
        <div id="tab-listen" class="tab-content active">
            <div class="card">
                <h2 id="display-radio-name">Transfr On Air</h2>
                <div class="status"><div class="live-dot"></div> EN DIRECT</div>
                <div class="counter">👥 <span id="listener-count">0</span> auditeurs connectés</div>
                <button class="btn" id="playButton" onclick="togglePlay()">▶ Lancer la Radio</button>
            </div>
        </div>

        <!-- ONGLET 2 : STUDIO -->
        <div id="tab-studio" class="tab-content">
            <div class="card">
                <h2>Studio Animateur</h2>
                <p style="font-size: 14px; color: #a4b0be; margin-bottom: 15px;">Tu es connecté. Tu peux maintenant envoyer ton flux.</p>
                <button class="btn btn-stream" id="streamButton" onclick="startStreaming()">🎙 Activer le Micro</button>
                <div class="log-box" id="studioLogs">Studio prêt.</div>
            </div>
        </div>

        <!-- ONGLET 3 : CONFIGURATION -->
        <div id="tab-settings" class="tab-content">
            <div class="card">
                <h2>Paramètres Radio</h2>
                <label style="text-align: left; display: block; font-size: 14px; color: #a4b0be;">Nom de ta station de radio :</label>
                <input type="text" id="radioNameInput" value="Transfr On Air" oninput="updateRadioName()">
                <p style="font-size: 12px; color: #2ed573; margin-top: 10px;">Changement appliqué directement !</p>
            </div>
        </div>
    </div>

    <!-- VRAIE PAGE D'INSCRIPTION / CONNEXION (EN PLEIN MILIEU) -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <h2 id="authTitle">Créer un compte</h2>
            <p id="authError" style="color: #ff4757; font-size: 14px; margin-bottom: 10px; display: none;"></p>
            
            <input type="text" id="authUsername" placeholder="Choisis un pseudo">
            <input type="password" id="authPassword" placeholder="Mot de passe">
            
            <button class="btn" id="authSubmitBtn" onclick="submitAuth()">Valider</button>
            <br>
            <button class="close-auth" onclick="hideAuthPage()">Annuler et retourner au site</button>
        </div>
    </div>

    <script>
        let isLoggedIn = false;
        let currentAuthAction = 'register';

        // CHANGER D'ONGLET
        function switchTab(tabId, button) {
            if (button.classList.contains('locked')) {
                alert("🔒 Accès refusé : Tu dois d'abord te connecter à ton compte pour accéder au Studio !");
                return;
            }
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            button.classList.add('active');
        }

        function updateRadioName() {
            const name = document.getElementById('radioNameInput').value;
            document.getElementById('display-radio-name').innerText = name;
        }

        // AFFICHER LA PAGE D'INSCRIPTION/CONNEXION EN PLEIN MILIEU
        function showAuthPage(type) {
            currentAuthAction = type;
            document.getElementById('authError').style.display = 'none';
            document.getElementById('authUsername').value = '';
            document.getElementById('authPassword').value = '';
            
            if (type === 'login') {
                document.getElementById('authTitle').innerText = "Connexion à ton espace";
                document.getElementById('authSubmitBtn').innerText = "Se connecter";
            } else {
                document.getElementById('authTitle').innerText = "Créer un compte Transfr";
                document.getElementById('authSubmitBtn').innerText = "Créer mon compte";
            }
            document.getElementById('authOverlay').style.display = 'flex';
        }

        function hideAuthPage() {
            document.getElementById('authOverlay').style.display = 'none';
        }

        // ENVOI AU SERVEUR SANS POP-UP CRADE
        async function submitAuth() {
            const username = document.getElementById('authUsername').value;
            const password = document.getElementById('authPassword').value;
            const errorDiv = document.getElementById('authError');

            if (!username || !password) {
                errorDiv.innerText = "Remplis tous les champs !";
                errorDiv.style.display = 'block';
                return;
            }

            const endpoint = currentAuthAction === 'login' ? '/api/login' : '/api/register';
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();

                if (!result.success) {
                    errorDiv.innerText = result.message;
                    errorDiv.style.display = 'block';
                } else {
                    hideAuthPage();
                    if (currentAuthAction === 'login') {
                        isLoggedIn = true;
                        document.getElementById('loginBtn').style.display = 'none';
                        document.getElementById('registerBtn').style.display = 'none';
                        
                        const welcome = document.getElementById('user-welcome');
                        welcome.innerText = "👋 " + username;
                        welcome.style.display = 'inline';

                        const studioBtn = document.getElementById('studio-menu-btn');
                        studioBtn.classList.remove('locked');
                        studioBtn.removeAttribute('disabled');
                    } else {
                        // Si inscription réussie, on le bascule sur la connexion
                        showAuthPage('login');
                        errorDiv.innerText = "Compte créé ! Connecte-toi maintenant.";
                        errorDiv.style.color = "#2ed573";
                        errorDiv.style.display = 'block';
                    }
                }
            } catch (err) {
                errorDiv.innerText = "⚠️ Erreur : Le serveur Node.js n'est pas allumé.";
                errorDiv.style.color = "#ff4757";
                errorDiv.style.display = 'block';
            }
        }

        // --- WEBSOCKET COMPTEUR REEL ---
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const wsUrl = protocol + window.location.host;
        let socket;

        function connectWebSocket() {
            socket = new WebSocket(wsUrl);
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'COUNTER_UPDATE') {
                    document.getElementById('listener-count').innerText = data.count;
                }
            };
            socket.onclose = () => { setTimeout(connectWebSocket, 3000); };
        }
        connectWebSocket();

        // --- LECTEUR AUDIO ---
        let isPlaying = false;
        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('playButton').innerText = isPlaying ? "⏸ Pause Radio" : "▶ Lancer la Radio";
        }

        // --- MICRO STREAMING ---
        async function startStreaming() {
            const studioLogs = document.getElementById('studioLogs');
            studioLogs.innerHTML += "<br>> Demande du micro...";
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                studioLogs.innerHTML += "<br>> Micro branché !";
            } catch (err) {
                studioLogs.innerHTML += "<br>> Erreur micro : " + err.message;
            }
        }
    </script>
</body>
</html>
