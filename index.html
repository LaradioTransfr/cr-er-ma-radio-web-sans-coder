<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfr - Crée ta Web Radio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #12121c, #08080f); color: #ffffff; display: flex; min-height: 100vh; overflow-x: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 300px; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border-right: 1px solid rgba(255, 255, 255, 0.08); display: flex; flex-direction: column; padding: 35px 25px; z-index: 10; }
        .logo { font-size: 28px; font-weight: 800; color: #ff4757; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 40px; text-align: center; }
        .menu-btn { background: transparent; color: #a4b0be; border: none; padding: 15px 20px; text-align: left; font-size: 16px; font-weight: 600; cursor: pointer; border-radius: 14px; margin-bottom: 12px; transition: 0.3s; display: flex; align-items: center; gap: 12px; width: 100%; }
        .menu-btn:hover, .menu-btn.active { background-color: #ff4757; color: white; }
        .menu-btn.locked { opacity: 0.3; cursor: not-allowed; }
        
        /* ZONE PRINCIPALE */
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        header { width: 100%; display: flex; justify-content: flex-end; position: absolute; top: 30px; right: 40px; }
        .auth-buttons button { background-color: #ff4757; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .auth-buttons button.secondary { background-color: transparent; border: 2px solid #ffffff; }
        
        .tab-content { display: none; width: 100%; max-width: 600px; }
        .tab-content.active { display: block; }
        .card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); text-align: center; width: 100%; }
        
        h2 { margin-bottom: 15px; font-size: 26px; color: #ff4757; }
        .status { color: #2ed573; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .live-dot { width: 12px; height: 12px; background-color: #2ed573; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        .radio-avatar-preview { width: 150px; height: 150px; border-radius: 25px; background-color: rgba(255,255,255,0.05); margin: 0 auto 25px auto; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed rgba(255,255,255,0.15); }
        .radio-avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

        .btn { background-color: #ff4757; color: white; border: none; padding: 16px 32px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 15px; }
        .btn-stream { background-color: #1e90ff; }
        .log-box { background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 12px; margin-top: 25px; font-family: monospace; font-size: 13px; text-align: left; max-height: 120px; overflow-y: auto; color: #57ffb4; }
        
        input[type="text"], input[type="password"] { width: 100%; padding: 14px 20px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-size: 16px; outline: none; }
        .social-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 16px; margin-bottom: 15px; text-align: left; }
        
        /* AUTH OVERLAY */
        .auth-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(8, 8, 15, 0.95); z-index: 100; justify-content: center; align-items: center; }
        .auth-card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="auth-buttons" id="auth-section">
            <span id="user-welcome" style="display: none; color: #2ed573; margin-right: 15px; font-weight: bold;"></span>
            <button class="secondary" id="loginBtn" onclick="showAuthPage('login')">Connexion</button>
            <button id="registerBtn" onclick="showAuthPage('register')">Créer un compte</button>
            <button id="logoutBtn" style="display: none; background-color:#747d8c;" onclick="logout()">Déconnexion</button>
        </div>
    </header>

    <div class="sidebar">
        <div class="logo">Transfr</div>
        <button class="menu-btn active" onclick="switchTab('tab-listen', this)">📻 Écouter la Radio</button>
        <button class="menu-btn locked" id="btn-studio" disabled onclick="switchTab('tab-studio', this)">🎙 Mon Studio</button>
        <button class="menu-btn locked" id="btn-social" disabled onclick="switchTab('tab-social', this)">🌐 Multistreaming</button>
        <button class="menu-btn" onclick="switchTab('tab-settings', this)">⚙️ Configuration</button>
    </div>

    <div class="main-content">
        <div id="tab-listen" class="tab-content active">
            <div class="card">
                <div class="radio-avatar-preview">
                    <span id="noPhotoText">Pas de logo</span>
                    <img id="playerAvatarImg" src="" style="display: none;">
                </div>
                <h2 id="display-radio-name">Ma Radio Web</h2>
                <div class="status"><div class="live-dot"></div> EN DIRECT</div>
                <button class="btn" id="playButton" onclick="togglePlay()">▶ Brancher le Flux en Direct</button>
            </div>
        </div>

        <div id="tab-studio" class="tab-content">
            <div class="card">
                <h2>Studio Animateur Direct</h2>
                <button class="btn btn-stream" id="streamButton" onclick="startStreaming()">🎙 Ouvrir le Micro et Diffuser</button>
                <div class="log-box" id="studioLogs">Studio prêt. Parle dans ton micro pour envoyer le son au serveur.</div>
            </div>
        </div>

        <div id="tab-social" class="tab-content">
            <div class="card">
                <h2>Réseaux Sociaux Connectés</h2>
                <div class="social-row">
                    <div style="flex:1; margin-right:10px;"><strong>🔴 YouTube Live</strong><input type="password" id="ytKey" placeholder="Clé de flux" oninput="saveSocial()"></div>
                    <input type="checkbox" id="ytToggle" onchange="saveSocial()">
                </div>
            </div>
        </div>

        <div id="tab-settings" class="tab-content">
            <div class="card">
                <h2>Configuration Radio</h2>
                <input type="text" id="radioNameInput" value="Ma Radio Web" oninput="saveRadioSettings()">
                <input type="file" id="radioPhotoFile" accept="image/*" onchange="uploadRadioPhoto()">
            </div>
        </div>
    </div>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <h2 id="authTitle">Connexion</h2>
            <input type="text" id="authUsername" placeholder="Pseudo">
            <input type="password" id="authPassword" placeholder="Mot de passe">
            <button class="btn" onclick="submitAuth()">Valider</button>
            <button class="btn" style="background:#747d8c;" onclick="hideAuthPage()">Retour</button>
        </div>
    </div>

    <script>
        let socket;
        let audioContext;
        let processor;
        let globalStream;

        // SE SOUVENIR DE TOUT AU CHARGEMENT
        window.onload = function() {
            const savedUser = localStorage.getItem('tf_user');
            if (savedUser) { activateUser(savedUser); }
            
            const savedName = localStorage.getItem('tf_name');
            if (savedName) { document.getElementById('radioNameInput').value = savedName; document.getElementById('display-radio-name').innerText = savedName; }
            
            const savedPhoto = localStorage.getItem('tf_photo');
            if (savedPhoto) { displayPhoto(savedPhoto); }

            connectServer();
        };

        function connectServer() {
            const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            socket = new WebSocket(protocol + window.location.host);
            socket.binaryType = 'arraybuffer';

            // QUAND LE SERVEUR ENVOIE DU SON AUX AUDITEURS
            socket.onmessage = async (event) => {
                if (event.data instanceof ArrayBuffer && !globalStream) {
                    playAudioBuffer(event.data);
                }
            };
        }

        // --- ENVOYER LE SON (ANIMATEUR) ---
        async function startStreaming() {
            const logs = document.getElementById('studioLogs');
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                globalStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(globalStream);
                
                processor = audioContext.createScriptProcessor(4096, 1, 1);
                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (e) => {
                    const inputData = e.inputBuffer.getChannelData(0);
                    // Conversion en Int16 pour envoyer moins de données au serveur
                    const audioBuffer = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        audioBuffer[i] = Math.min(1, Math.max(-1, inputData[i])) * 0x7FFF;
                    }
                    if (socket.readyState === WebSocket.OPEN) {
                        socket.send(audioBuffer.buffer); // Le son part au serveur !
                    }
                };
                logs.innerHTML = "🎙️ EN DIRECT ! Ton micro est envoyé au serveur pour tous les auditeurs !";
            } catch (err) { logs.innerHTML = "Erreur micro : " + err.message; }
        }

        // --- RECEVOIR ET JOUER LE SON (AUDITEUR) ---
        let audioStack = [];
        let nextStartTime = 0;
        
        function playAudioBuffer(arrayBuffer) {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            
            const int16Array = new Int16Array(arrayBuffer);
            const float32Array = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) {
                float32Array[i] = int16Array[i] / 0x7FFF;
            }

            const buffer = audioContext.createBuffer(1, float32Array.length, 16000);
            buffer.getChannelData(0).set(float32Array);

            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);

            if (nextStartTime < audioContext.currentTime) {
                nextStartTime = audioContext.currentTime + 0.05;
            }
            source.start(nextStartTime);
            nextStartTime += buffer.duration;
        }

        function togglePlay() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            document.getElementById('playButton').innerText = "🔊 Écoute en cours...";
        }

        // FONCTIONS COMPTE ET CONFIGURATION
        function showAuthPage(type) { document.getElementById('authOverlay').style.display = 'flex'; }
        function hideAuthPage() { document.getElementById('authOverlay').style.display = 'none'; }
        
        function submitAuth() {
            const user = document.getElementById('authUsername').value;
            localStorage.setItem('tf_user', user);
            activateUser(user);
            hideAuthPage();
        }

        function activateUser(user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('registerBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('user-welcome').innerText = "👋 " + user;
            document.getElementById('user-welcome').style.display = 'inline';
            document.getElementById('btn-studio').classList.remove('locked');
            document.getElementById('btn-studio').removeAttribute('disabled');
            document.getElementById('btn-social').classList.remove('locked');
            document.getElementById('btn-social').removeAttribute('disabled');
        }

        function logout() { localStorage.removeItem('tf_user'); window.location.reload(); }
        function saveRadioSettings() { const n = document.getElementById('radioNameInput').value; document.getElementById('display-radio-name').innerText = n; localStorage.setItem('tf_name', n); }
        function uploadRadioPhoto() { const file = document.getElementById('radioPhotoFile').files[0]; const reader = new FileReader(); reader.onloadend = () => { localStorage.setItem('tf_photo', reader.result); displayPhoto(reader.result); }; if (file) reader.readAsDataURL(file); }
        function displayPhoto(data) { document.getElementById('noPhotoText').style.display = 'none'; const img = document.getElementById('playerAvatarImg'); img.src = data; img.style.display = 'block'; }
        function switchTab(id, btn) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function saveSocial() {}
    </script>
</body>
</html>
