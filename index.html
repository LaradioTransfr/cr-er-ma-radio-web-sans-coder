<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfr - Ta Plateforme Radio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #11111b);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff4757;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .auth-buttons button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .auth-buttons button.secondary {
            background-color: transparent;
            border: 2px solid #ffffff;
        }

        .auth-buttons button:hover {
            transform: scale(1.05);
            background-color: #ff6b81;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            width: 350px;
        }

        .station-name {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .status {
            color: #2ed573;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #2ed573;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        .counter {
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 14px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .play-btn {
            background-color: #ff4757;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(2ff, 71, 87, 0.4);
        }

        .play-btn:hover {
            transform: scale(1.1);
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Transfr</div>
        <div class="auth-buttons">
            <button class="secondary" onclick="alert('Fenêtre de connexion bientôt disponible !')">Connexion</button>
            <button onclick="alert('Fenêtre d\'inscription bientôt disponible !')">Créer un compte</button>
        </div>
    </header>

    <div class="main-container">
        <div class="player-card">
            <div class="station-name">Ma Super Radio</div>
            <div class="status"><div class="live-dot"></div> EN DIRECT</div>
            
            <div class="counter">👥 <span id="listener-count">0</span> auditeurs connectés</div>
            
            <br>
            <button class="play-btn" id="playButton" onclick="togglePlay()">▶</button>
        </div>
    </div>

    <script>
        let isPlaying = false;
        const playButton = document.getElementById('playButton');

        function togglePlay() {
            isPlaying = !isPlaying;
            if(isPlaying) {
                playButton.innerText = "⏸";
                // Ici on ajoutera le lien du flux audio de la radio
            } else {
                playButton.innerText = "▶";
            }
        }
    </script>

</body>
</html>
